# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Optionally build your docs in additional formats such as PDF and ePub
formats:
  - htmlzip
  - epub
  # - pdf  # busted by latex crash on unicode U+030A combining ring above, in text() docs

# Optionally set the version of Python and requirements required to build your docs
build:
   os: ubuntu-22.04
   tools:
      python: "3.14"
      rust: "latest"
   jobs:
      # docs/conf.py inserts hypothesis/src on sys.path so the docs reflect the
      # local checkout, but the compiled `hypothesis._native` extension only
      # lives in site-packages after a regular install. An editable install
      # drops it into src/hypothesis/ so the source-tree import resolves.
      post_install:
         - python -m pip install -e ./hypothesis[all]
python:
   install:
      - requirements: requirements/tools.txt
sphinx:
   configuration: hypothesis/docs/conf.py
